<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Registeration</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
</head>
<body>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; background-color: #f0f2f5;">

    <div>
        {% for message in messages %}
        <h5 style="color: red; text-align: center;">{{message}}</h5>
        {% endfor %}
    </div>

    <form action="register" method="post" style="background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center;">
        {% csrf_token %}
        
        <h2 style="margin-top: 0;">Register</h2>
        
        <input type="text" name="first_name" placeholder="First Name" style="margin-bottom: 10px; padding: 8px; width: 200px;"><br>
        <input type="text" name="last_name" placeholder="Last Name" style="margin-bottom: 10px; padding: 8px; width: 200px;"><br>
        <input type="text" name="username" placeholder="Username" style="margin-bottom: 10px; padding: 8px; width: 200px;"><br>
        <input type="email" name="email" placeholder="Email ID" style="margin-bottom: 10px; padding: 8px; width: 200px;"><br>
        <input type="password" name="password1" placeholder="Password" style="margin-bottom: 10px; padding: 8px; width: 200px;"><br>
        <input type="password" name="password2" placeholder="Confirm Password" style="margin-bottom: 15px; padding: 8px; width: 200px;"><br>
        
        <input type="submit" value="Sign Up" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
    </form>

</body>
</html>
